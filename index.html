<!doctype html>
<html lang="ko" class="preload">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ 기본 제목 -->
    <title>준성 ♥ 도영 결혼합니다</title>

    <!-- ✅ 기본 설명 -->
    <meta name="description" content="2026년 4월 25일, 준성 ♥ 도영 결혼합니다." />

    <!-- ✅ Open Graph (카카오톡, 문자, 메신저 공유용) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="준성 ♥ 도영 결혼합니다" />
    <meta property="og:description" content="2026년 4월 25일, 준성 ♥ 도영 결혼합니다" />
    <meta property="og:url" content="https://junsungdoyoungwedding.pages.dev/" />
    <meta property="og:image" content="https://junsungdoyoungwedding.pages.dev/og_image_v2.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ✅ Twitter Card (PC 카톡 / 일부 앱 대응) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="준성 ♥ 도영 결혼합니다" />
    <meta name="twitter:description" content="2026년 4월 25일, 준성 ♥ 도영 결혼합니다." />
    <meta name="twitter:image" content="https://junsungdoyoungwedding.pages.dev/og_image_v2.jpg" />

    <!-- ✅ Main_Photo.jpg를 최우선으로 미리 받기 -->
    <link rel="preload" as="image" href="/img/Main_Photo.jpg" fetchpriority="high" />

    <!-- ✅ Noto Sans KR 로드 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      html.preload body { visibility: hidden; }
    </style>

    <script>
      (function () {
        if ('scrollRestoration' in history) {
          history.scrollRestoration = 'manual';
        }

        window.scrollTo(0, 0);

        function revealWhenTop() {
          window.scrollTo(0, 0);
          requestAnimationFrame(function () {
            window.scrollTo(0, 0);
            requestAnimationFrame(function () {
              if (window.scrollY === 0) {
                document.documentElement.classList.remove('preload');
              } else {
                setTimeout(revealWhenTop, 50);
              }
            });
          });
        }

        window.addEventListener('pageshow', function () {
          revealWhenTop();
        });

        window.addEventListener('load', function () {
          revealWhenTop();
        });
      })();
    </script>

    <!-- Cloudflare Web Analytics -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "5f0160e6742f4b1aadec996321b2ae75"}'>
    </script>
    <!-- End Cloudflare Web Analytics -->

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
